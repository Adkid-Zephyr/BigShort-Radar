<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>Finance Radar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
      background: #0b0d10;
      color: #e5e7eb;
      margin: 0;
      padding: 32px;
    }
    h1 { font-size: 22px; font-weight: 500; margin: 0 0 4px; }
    p.sub { color: #9ca3af; font-size: 13px; margin: 0 0 24px; }
    table { border-collapse: collapse; width: 100%; max-width: 880px; }
    th, td {
      padding: 12px 14px;
      text-align: left;
      border-bottom: 1px solid #1f2937;
      font-size: 14px;
    }
    th { color: #9ca3af; font-weight: 500; font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; }
    td.value { font-variant-numeric: tabular-nums; font-weight: 500; }
    .dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 8px;
      vertical-align: middle;
    }
    .level { font-size: 12px; color: #9ca3af; }
    .empty { color: #6b7280; font-style: italic; }
  </style>
</head>
<body>
  <h1>Finance Radar</h1>
  <p class="sub">市场风险温度计 · 数据从 SQLite 读取，颜色按各指标默认阈值实时分类</p>
  <table>
    <thead>
      <tr>
        <th>指标</th>
        <th>当前值</th>
        <th>等级</th>
        <th>日期</th>
        <th>来源</th>
      </tr>
    </thead>
    <tbody>
    {% for r in rows %}
      <tr>
        <td>
          <span class="dot" style="background: {{ r.color }};"></span>
          {{ r.label }}
        </td>
        {% if r.value is none %}
          <td class="empty" colspan="4">暂无数据，先跑 daily_fetch</td>
        {% else %}
          <td class="value">{{ "%.2f"|format(r.value) }}</td>
          <td class="level" style="color: {{ r.color }};">{{ r.level }}</td>
          <td>{{ r.date }}</td>
          <td>{{ r.source }}</td>
        {% endif %}
      </tr>
    {% endfor %}
    </tbody>
  </table>
</body>
</html>
